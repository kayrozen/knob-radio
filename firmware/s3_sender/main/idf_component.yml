# Managed dependencies. The LVGL/display components are pulled ONLY when the UI
# is enabled (rules gate on the Kconfig option), so the default TONE build and
# the ADF audio build stay lean and need no network fetch of LVGL.
dependencies:
  idf: ">=5.1"

  espressif/esp_lvgl_port:
    version: "^1.4"
    rules:
      - if: "CONFIG_PRESET_ENABLE_UI"
  lvgl/lvgl:
    version: "^8.3"
    rules:
      - if: "CONFIG_PRESET_ENABLE_UI"
  espressif/esp_lcd_st77916:
    version: "*"
    rules:
      - if: "CONFIG_PRESET_ENABLE_UI"
