name: CI

# Fast, authoritative host-side tests (no hardware, no ESP-IDF). The firmware is
# built and compile-checked by the install-page workflow, which produces the
# real flashable images for both chips.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  host-tests:
    name: Host unit tests (COBS / framing / jitter buffer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & run host tests
        run: make -C test/host test
