name: Install page (ESP Web Tools)

# Delivery stage of the pipeline: build flashable images for both chips, wrap
# them in ESP Web Tools manifests, and publish a browser-based installer
# (web/index.html). Uploaded as an artifact on every run; deployed to GitHub
# Pages on the default branch and tags. The fast tests (ci.yml) and the ADF
# compile-check (phase-e.yml) stay separate and authoritative.

on:
  workflow_dispatch:
  push:
    branches: [main, "claude/**"]
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build images + assemble installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout ESP-ADF (provides esp-idf for both chips)
        uses: actions/checkout@v4
        with:
          repository: espressif/esp-adf
          ref: v2.7
          path: esp-adf
          submodules: recursive

      - name: Build, merge, and assemble the installer
        run: |
          set -e
          export ADF_PATH="$GITHUB_WORKSPACE/esp-adf"
          export IDF_PATH="$ADF_PATH/esp-idf"
          "$IDF_PATH/install.sh" esp32,esp32s3
          . "$IDF_PATH/export.sh"

          DIST="$GITHUB_WORKSPACE/dist"
          mkdir -p "$DIST"
          VER="$(git rev-parse --short HEAD)"

          # --- Bridge (ESP32-U4WDH): plain IDF, esp32 target ---
          ( cd firmware/u4wdh_bridge
            idf.py set-target esp32 build
            idf.py merge-bin -o "$DIST/u4wdh-merged.bin" )

          # --- Main (ESP32-S3): full product build (ADF + UI + portal + haptic) ---
          ( cd firmware/s3_sender
            {
              printf 'CONFIG_PRESET_AUDIO_SOURCE_ADF=y\n'
              printf 'CONFIG_ESP32_S3_KORVO2_V3_BOARD=y\n'
              printf 'CONFIG_PRESET_ENABLE_UI=y\n'
              printf 'CONFIG_PRESET_ENABLE_HAPTIC=y\n'
              printf 'CONFIG_PRESET_ENABLE_PORTAL=y\n'
            } > sdkconfig.defaults.phase_e
            idf.py -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.phase_e" \
                   set-target esp32s3 build
            idf.py merge-bin -o "$DIST/s3-merged.bin" )

          # --- Installer page + ESP Web Tools manifests ---
          cp web/index.html "$DIST/index.html"
          cat > "$DIST/manifest-u4wdh.json" <<EOF
          { "name": "Preset Radio bridge (U4WDH)", "version": "$VER",
            "new_install_prompt_erase": true,
            "builds": [ { "chipFamily": "ESP32",
                          "parts": [ { "path": "u4wdh-merged.bin", "offset": 0 } ] } ] }
          EOF
          cat > "$DIST/manifest-s3.json" <<EOF
          { "name": "Preset Radio main (S3)", "version": "$VER",
            "new_install_prompt_erase": true,
            "builds": [ { "chipFamily": "ESP32-S3",
                          "parts": [ { "path": "s3-merged.bin", "offset": 0 } ] } ] }
          EOF
          ls -l "$DIST"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: install-page
          path: dist/

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
