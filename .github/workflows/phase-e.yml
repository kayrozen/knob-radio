name: Phase E build (ESP-ADF)

# Builds the S3 sender's Phase-E variant (real internet-radio pipeline) against
# a real ESP-ADF checkout. Separate from the main CI so the fast, authoritative
# host-test + plain-IDF builds are never gated on this heavier job. The LVGL UI
# is enabled too, so the preset screen (ui.c) and its managed components
# (esp_lvgl_port/lvgl/esp_lcd_st77916) are compile-checked here; only the actual
# panel bring-up on hardware is out of CI scope.

on:
  workflow_dispatch:
  push:
    paths:
      - "firmware/s3_sender/**"
      - "components/pcm_link/**"
      - ".github/workflows/phase-e.yml"

jobs:
  build-adf:
    name: Build s3_sender (ADF audio, esp32s3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout ESP-ADF (with submodules incl. esp-idf)
        uses: actions/checkout@v4
        with:
          repository: espressif/esp-adf
          ref: v2.7
          path: esp-adf
          submodules: recursive

      - name: Install toolchain & build
        run: |
          set -e
          export ADF_PATH="$GITHUB_WORKSPACE/esp-adf"
          export IDF_PATH="$ADF_PATH/esp-idf"
          "$IDF_PATH/install.sh" esp32s3
          . "$IDF_PATH/export.sh"
          cd firmware/s3_sender
          # Enable the ESP-ADF audio source on top of the project defaults.
          # (The FreeRTOS backward-compatibility option ADF needs lives in the
          # committed sdkconfig.defaults so on-hardware ADF builds get it too.)
          # ESP-ADF's root CMakeLists registers its whole component tree,
          # including the board-specific audio_board, which defaults to the
          # LyraT v4.3 (ESP32) pin map and won't compile for the S3. We never
          # touch a codec/board (output is PCM over UART), but the table still
          # has to build, so pick an ESP32-S3 board for valid GPIO constants.
          {
            printf 'CONFIG_PRESET_AUDIO_SOURCE_ADF=y\n'
            printf 'CONFIG_ESP32_S3_KORVO2_V3_BOARD=y\n'
            printf 'CONFIG_PRESET_ENABLE_UI=y\n'
            printf 'CONFIG_PRESET_ENABLE_HAPTIC=y\n'
            printf 'CONFIG_PRESET_ENABLE_PORTAL=y\n'
          } > sdkconfig.defaults.phase_e
          idf.py -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.phase_e" \
                 set-target esp32s3 build
